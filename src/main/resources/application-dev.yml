
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      # password: your_password  # bỏ comment nếu Redis có password
  jpa:
    hibernate:
      ddl-auto: none   # dev thì update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
