
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  data:
    redis:
      host: localhost
      port: 6379
      # password: your_password  # bỏ comment nếu Redis có password
  jpa:
    hibernate:
      ddl-auto: update  # dev thì update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: 3600        # 1 giờ (giây)
  refreshable-duration: 86400 # 24 giờ (giây)

server:
  port: 8081
app:
  frontend-url: http://localhost:3000

vnpay:
  tmn-code: ${TMN_CODE}
  hash-secret: ${TMN_KEY}
  payment-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: https://5ea7-14-191-56-27.ngrok-free.app/api/v1/payments/vnpay/return
  ipn-url: https://5ea7-14-191-56-27.ngrok-free.app/api/v1/payments/vnpay/ipn
  version: "2.1.0"
  command: pay
  currency-code: VND
  locale: vn

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    doc-expansion: none
    display-request-duration: true
    try-it-out-enabled: true
    persistAuthorization: true
    filter: true